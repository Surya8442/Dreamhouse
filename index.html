<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DreamHouse Pro</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f5f7fa; }
    .hero { background:url('https://source.unsplash.com/1600x600/?luxury-house') center/cover no-repeat; height:70vh; color:white; display:flex; align-items:center; justify-content:center; text-align:center; }
    .hero h1 { font-size:3.5rem; font-weight:bold; }
    .card img { height:200px; object-fit:cover; }
    .section-title { font-weight:bold; margin:40px 0 20px; }
    footer { background:#222; color:#fff; padding:20px; text-align:center; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">DreamHouse Pro</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Buy</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Sell</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div>
    <h1>Find Your Dream Home</h1>
    <p>Over 1000+ premium listings worldwide</p>
    <button class="btn btn-primary btn-lg">Explore Now</button>
  </div>
</section>

<!-- Search -->
<div class="container mt-4">
  <div class="row g-3">
    <div class="col-md-3"><input class="form-control" placeholder="Location"></div>
    <div class="col-md-3"><input class="form-control" placeholder="Min Price"></div>
    <div class="col-md-3"><input class="form-control" placeholder="Max Price"></div>
    <div class="col-md-3"><button class="btn btn-success w-100">Search</button></div>
  </div>
</div>

<!-- Listings -->
<div class="container">
  <h2 class="section-title">Featured Properties</h2>
  <div class="row" id="propertyContainer"></div>
</div>

<!-- Footer -->
<footer>
  <p>© 2026 DreamHouse Pro | All Rights Reserved</p>
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const container = document.getElementById("propertyContainer");

const images = [
  "https://picsum.photos/id/1018/400/300",
  "https://picsum.photos/id/1015/400/300",
  "https://picsum.photos/id/1019/400/300",
  "https://picsum.photos/id/1020/400/300",
  "https://picsum.photos/id/1024/400/300",
  "https://picsum.photos/id/1025/400/300",
  "https://picsum.photos/id/1031/400/300",
  "https://picsum.photos/id/1035/400/300",
  "https://picsum.photos/id/1038/400/300",
  "https://picsum.photos/id/1043/400/300",
  "https://picsum.photos/id/1050/400/300",
  "https://picsum.photos/id/1057/400/300",
  "https://picsum.photos/id/1060/400/300",
  "https://picsum.photos/id/1067/400/300",
  "https://picsum.photos/id/1070/400/300",
  "https://picsum.photos/id/1080/400/300",
  "https://picsum.photos/id/1084/400/300",
  "https://picsum.photos/id/1081/400/300",
  "https://picsum.photos/id/1082/400/300",
  "https://picsum.photos/id/1083/400/300",
  "https://picsum.photos/id/1085/400/300",
  "https://picsum.photos/id/1089/400/300",
  "https://picsum.photos/id/109/400/300",
  "https://picsum.photos/id/110/400/300",
  "https://picsum.photos/id/111/400/300",
  "https://picsum.photos/id/112/400/300",
  "https://picsum.photos/id/113/400/300",
  "https://picsum.photos/id/114/400/300",
  "https://picsum.photos/id/115/400/300",
  "https://picsum.photos/id/116/400/300"
];

images.forEach((type, index) => {
  const card = `
  <div class="col-md-4 mb-4">
    <div class="card shadow">
      <img src="${images[index]}" class="card-img-top">
      <div class="card-body">
        <h5 class="card-title">Property ${index + 1}</h5>
        <p class="card-text">Price: $${(index+1)*10000} | 3 Beds | 2 Baths</p>
        <button class="btn btn-primary" onclick="viewDetails(${index})">View Details</button>
      </div>
    </div>
  </div>`;
  container.innerHTML += card;
});

function viewDetails(id) {
  alert("Viewing details for Property " + (id+1));
}
</script>

</body>
</html>
